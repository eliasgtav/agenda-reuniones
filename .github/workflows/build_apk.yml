name: Compilar APK Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-pip build-essential git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev cmake \
            libffi-dev libssl-dev

      - name: Instalar buildozer y cython
        run: pip install buildozer==1.5.0 cython==0.29.36

      - name: Pre-clonar p4a master y aplicar parches
        run: |
          mkdir -p .buildozer/android/platform
          git clone -b master https://github.com/kivy/python-for-android.git \
            .buildozer/android/platform/python-for-android
          python3 scripts/patch_p4a.py
          cd .buildozer/android/platform/python-for-android
          git config user.email 'build@ci' && git config user.name 'CI'
          git add -A
          git diff --cached --quiet || git commit -m 'fix python 3.12.9 + hwui android15'

      - name: Caché de buildozer (NDK/SDK)
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-312-${{ hashFiles('buildozer.spec', 'scripts/patch_p4a.py') }}
          restore-keys: buildozer-312-

      - name: Recomprimir stdlib.zip a ZIP_STORED en cache buildozer
        run: |
          python3 - <<'PYEOF'
          import zipfile, glob, io, os
          pattern = os.path.expanduser('~/.buildozer/**/stdlib.zip')
          found = glob.glob(pattern, recursive=True)
          if not found:
              print("stdlib.zip no esta en cache todavia (se construira con ZIP_STORED)")
          for z in found:
              with open(z, 'rb') as f:
                  data = f.read()
              zf = zipfile.ZipFile(io.BytesIO(data))
              deflated = [i for i in zf.infolist() if i.compress_type != 0]
              if not deflated:
                  print(f"Ya STORED: {z}")
                  continue
              print(f"Convirtiendo {len(deflated)} entradas en {z}...")
              buf = io.BytesIO()
              with zipfile.ZipFile(buf, 'w', zipfile.ZIP_STORED) as nzf:
                  for info in zf.infolist():
                      nzf.writestr(info, zf.read(info.filename))
              with open(z, 'wb') as f:
                  f.write(buf.getvalue())
              print(f"  Convertido: {os.path.getsize(z):,} bytes")
          PYEOF

      - name: Compilar APK
        run: buildozer -v android debug

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: AgendaReuniones-APK
          path: bin/*.apk
          retention-days: 30
