name: Compilar APK Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-pip build-essential git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev cmake \
            libffi-dev libssl-dev

      - name: Instalar buildozer y cython
        run: pip install buildozer==1.5.0 cython==0.29.36

      - name: Pre-clonar p4a (master, Python 3.14 con parches oficiales) y aplicar parches
        run: |
          mkdir -p .buildozer/android/platform
          # "-b master" es obligatorio: el repo de p4a tiene "develop" como
          # rama por defecto, y buildozer (targets/android.py _install_p4a)
          # compara la rama actual (`git branch -vv`) contra p4a.branch
          # ("master"); si no coincide, BORRA el directorio y reclona,
          # descartando los parches sin avisar. Por eso tampoco usamos
          # "checkout <sha>" (deja detached HEAD, que nunca coincide con
          # "master"): nos quedamos en la punta real de master.
          git clone -b master https://github.com/kivy/python-for-android.git \
            .buildozer/android/platform/python-for-android
          python3 scripts/patch_p4a.py
          cd .buildozer/android/platform/python-for-android
          git config user.email 'build@ci' && git config user.name 'CI'
          git add -A
          git diff --cached --quiet || git commit -m 'stdlib.zip STORED + diagnostico start.c'

      - name: Caché de buildozer (NDK/SDK)
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-p4amaster-${{ hashFiles('buildozer.spec', 'scripts/patch_p4a.py') }}
          restore-keys: |
            buildozer-p4amaster-

      - name: Preparar keystore de debug fijo
        run: |
          mkdir -p ~/.android
          if [ -f ci/debug.keystore ]; then
            echo "Usando keystore de debug ya committeado (firma estable entre builds)."
            cp ci/debug.keystore ~/.android/debug.keystore
          else
            echo "No existe ci/debug.keystore todavia: generando uno nuevo."
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -storepass android -keypass android \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Agenda Debug, O=Elias Gaytan Alvino, C=MX"
          fi

      - name: Compilar APK
        run: buildozer -v android debug

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: AgendaReuniones-APK
          path: bin/*.apk
          retention-days: 30

      - name: Subir keystore de debug como artefacto (solo para guardarlo en el repo una vez)
        if: ${{ !hashFiles('ci/debug.keystore') }}
        uses: actions/upload-artifact@v4
        with:
          name: debug-keystore
          path: ~/.android/debug.keystore
          retention-days: 30
