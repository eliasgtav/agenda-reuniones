name: Compilar APK Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-pip build-essential git zip unzip \
            openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev cmake \
            libffi-dev libssl-dev

      - name: Instalar buildozer y cython
        run: pip install buildozer==1.5.0 cython==0.29.36

      - name: Pre-clonar p4a y parchear Python 3.14 a 3.12.9
        run: |
          mkdir -p .buildozer/android/platform
          git clone --depth 1 https://github.com/kivy/python-for-android.git \
            .buildozer/android/platform/python-for-android

          cat > /tmp/patch_p4a.py << 'PYEOF'
import re

base = '.buildozer/android/platform/python-for-android/pythonforandroid/recipes'

# hostpython3: Python 3.14 -> 3.12.9
path = f'{base}/hostpython3/__init__.py'
c = open(path).read()
c = re.sub(r"version = '[0-9.]+'", "version = '3.12.9'", c, count=1)
c = re.sub(r"sha512sum = '[^']*'", "sha512sum = ''", c)
c = re.sub(r'patches\s*=\s*\[[\s\S]*?\]', 'patches = []', c, count=1)
open(path, 'w').write(c)
print('hostpython3 parcheado a 3.12.9')

# python3: override version y apply_patches
path = f'{base}/python3/__init__.py'
c = open(path).read()
c = re.sub(r"version = '[0-9.]+'", "version = '3.12.9'", c, count=1)
c = re.sub(r"sha512sum = '[^']*'", "sha512sum = ''", c)
c += '\nclass _Py312Fix(Python3Recipe):\n    version = "3.12.9"\n    sha512sum = ""\n    patches = []\n    def apply_patches(self, arch, build_dir=None): pass\nPython3Recipe = _Py312Fix\nrecipe = Python3Recipe()\n'
open(path, 'w').write(c)
print('python3 parcheado a 3.12.9')
PYEOF
          python3 /tmp/patch_p4a.py

          # Apuntar origin a sí mismo para que 'git pull' devuelva "Already up to date"
          git -C .buildozer/android/platform/python-for-android \
            remote set-url origin "$(pwd)/.buildozer/android/platform/python-for-android"

      - name: Caché de buildozer (NDK/SDK)
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: Compilar APK
        run: buildozer -v android debug

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: AgendaReuniones-APK
          path: bin/*.apk
          retention-days: 30
