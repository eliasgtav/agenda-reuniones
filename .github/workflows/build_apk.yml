name: Compilar APK Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-pip build-essential git zip unzip \
            openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev cmake \
            libffi-dev libssl-dev

      - name: Instalar buildozer y cython
        run: pip install buildozer==1.5.0 cython==0.29.36

      - name: Caché de buildozer (NDK/SDK)
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: Compilar APK
        run: buildozer -v android debug

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: AgendaReuniones-APK
          path: bin/*.apk
          retention-days: 30
