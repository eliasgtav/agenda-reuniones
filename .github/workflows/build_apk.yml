name: Compilar APK Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-pip build-essential git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev cmake \
            libffi-dev libssl-dev

      - name: Instalar buildozer y cython
        run: pip install buildozer==1.5.0 cython==0.29.36

      - name: Clonar p4a commit 2ebea90d9d (Python 3.11.5 estable)
        run: |
          mkdir -p .buildozer/android/platform
          git clone https://github.com/kivy/python-for-android.git \
            .buildozer/android/platform/python-for-android
          git -C .buildozer/android/platform/python-for-android checkout 2ebea90d9d

      - name: Aplicar parche HWUI (AndroidManifest)
        run: python3 scripts/patch_p4a.py

      - name: Commit del parche en p4a
        run: |
          cd .buildozer/android/platform/python-for-android
          git config user.email 'build@ci'
          git config user.name 'CI'
          git add -A
          git diff --cached --quiet || git commit -m 'hwui android15 fix'

      - name: Caché de buildozer (NDK/SDK)
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-py311-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-py311-

      - name: Compilar APK
        run: buildozer -v android debug

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: AgendaReuniones-APK
          path: bin/*.apk
          retention-days: 30
