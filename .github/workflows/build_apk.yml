name: Compilar APK Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-pip build-essential git zip unzip \
            openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev cmake \
            libffi-dev libssl-dev

      - name: Instalar buildozer y cython
        run: pip install buildozer==1.5.0 cython==0.29.36

      - name: Clonar p4a y parchear Python 3.14 → 3.12.9
        run: |
          git clone --depth 1 https://github.com/kivy/python-for-android.git /tmp/p4a
          python3 << 'PYEOF'
          import re

          def patch_hostpython3():
              path = '/tmp/p4a/pythonforandroid/recipes/hostpython3/__init__.py'
              with open(path) as f:
                  content = f.read()
              content = re.sub(r"(version\s*=\s*)['\"][\d.]+['\"]", r"\g<1>'3.12.9'", content, count=1)
              content = re.sub(r"(sha512sum\s*=\s*)['\"][^'\"]*['\"]", r"\g<1>''", content)
              content = re.sub(r"patches\s*=\s*\[[\s\S]*?\]", "patches = []", content)
              with open(path, 'w') as f:
                  f.write(content)
              print("hostpython3 parcheado a Python 3.12.9")

          def patch_python3():
              path = '/tmp/p4a/pythonforandroid/recipes/python3/__init__.py'
              with open(path) as f:
                  content = f.read()
              content = re.sub(r"(version\s*=\s*)['\"][\d.]+['\"]", r"\g<1>'3.12.9'", content, count=1)
              content = re.sub(r"(sha512sum\s*=\s*)['\"][^'\"]*['\"]", r"\g<1>''", content)
              # Agregar override al final para saltear patches incompatibles con 3.12.9
              override = """

          class _Python3RecipeFixed(Python3Recipe):
              version = '3.12.9'
              sha512sum = ''
              patches = []
              def apply_patches(self, arch, build_dir=None):
                  pass  # patches de 3.14 no aplican a 3.12.9

          Python3Recipe = _Python3RecipeFixed
          recipe = Python3Recipe()
          """
              content += override
              with open(path, 'w') as f:
                  f.write(content)
              print("python3 parcheado a Python 3.12.9")

          patch_hostpython3()
          patch_python3()
          PYEOF
          echo "p4a.source_dir = /tmp/p4a" >> buildozer.spec
          echo "buildozer.spec actualizado con p4a.source_dir"

      - name: Caché de buildozer (NDK/SDK)
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: Compilar APK
        run: buildozer -v android debug

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: AgendaReuniones-APK
          path: bin/*.apk
          retention-days: 30
