name: Compilar APK Android

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Descargar código
        uses: actions/checkout@v4

      - name: Configurar Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar dependencias del sistema
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            python3-pip build-essential git zip unzip \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev cmake \
            libffi-dev libssl-dev

      - name: Instalar buildozer y cython
        run: pip install buildozer==1.5.0 cython==0.29.36

      - name: Pre-clonar p4a (commit estable, Python 3.11.5 nativo) y aplicar parches
        run: |
          mkdir -p .buildozer/android/platform
          # IMPORTANTE: "-b master" es obligatorio. El repo de p4a tiene
          # "develop" como rama por defecto; sin -b master, `git clone`
          # aterriza en "develop", lo cual YA de por si no coincide con lo
          # que buildozer espera (ver nota abajo) y hace que borre todo.
          git clone -b master https://github.com/kivy/python-for-android.git \
            .buildozer/android/platform/python-for-android
          cd .buildozer/android/platform/python-for-android
          # IMPORTANTE: usar "reset --hard" (no "checkout <sha>"), que deja
          # el repo en detached HEAD. Buildozer (targets/android.py
          # _install_p4a) compara la rama actual (`git branch -vv`) contra
          # p4a.branch ("master" por defecto); si no coincide (detached HEAD
          # nunca coincide) BORRA el directorio entero y clona master de
          # nuevo, descartando todos los parches sin avisar. reset --hard
          # mantiene el checkout en la rama local "master".
          git reset --hard 2ebea90d9d7e965ef0754466abd185a41ab298aa
          cd -
          python3 scripts/patch_p4a.py
          cd .buildozer/android/platform/python-for-android
          git config user.email 'build@ci' && git config user.name 'CI'
          git add -A
          git diff --cached --quiet || git commit -m 'stdlib.zip STORED + diagnostico start.c'

      - name: Caché de buildozer (NDK/SDK)
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-p4a2ebea90-${{ hashFiles('buildozer.spec', 'scripts/patch_p4a.py') }}
          restore-keys: |
            buildozer-p4a2ebea90-

      - name: Compilar APK
        run: buildozer -v android debug

      - name: Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: AgendaReuniones-APK
          path: bin/*.apk
          retention-days: 30
